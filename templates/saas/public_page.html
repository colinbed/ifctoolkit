{% extends "saas/layout.html" %}
{% block title %}{{ title }} · IFC Toolkit{% endblock %}

{% block content %}
<section class="page-hero">
  <span class="eyebrow">IFC Toolkit</span>
  <h1>{{ heading }}</h1>
  <p>{{ copy }}</p>
  {% if route == '/contact' %}
    <a class="button" href="mailto:hello@ifctoolkit.com">hello@ifctoolkit.com</a>
  {% else %}
    <a class="button" href="/signup">Get Started</a>
  {% endif %}
</section>
{% endblock %}
