<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Toolkit</title>
    <link rel="stylesheet" href="{{ asset_url('style.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header-inner">
          {% include "partials/brand.html" %}
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link nav-root-link" href="/">Home</a>
            <a class="nav-link nav-root-link" href="/about">About</a>
            <a class="nav-link nav-root-link {% if active=='tools' %}active{% endif %}" href="/tools">Tools</a>
            <a class="nav-link nav-root-link" href="/documentation">Documentation</a>
            <a class="nav-link nav-root-link" href="/compliance">Compliance</a>
            <a class="nav-link nav-root-link" href="/pricing">Pricing</a>
            <a class="nav-link nav-root-link" href="/contact">Contact</a>
            <a class="nav-link nav-root-link {% if active=='upload' %}active{% endif %}" href="/upload">Upload</a>
          </nav>
          <div class="session-badge" data-session-badge>Session establishing...</div>
        </div>
      </header>

      <div class="processing-bar" data-processing-bar aria-live="polite">
        <div class="processing-label" data-processing-label>Processing files...</div>
        <div class="processing-track" role="progressbar" aria-valuetext="Processing">
          <div class="processing-fill"></div>
        </div>
        <div class="processing-percent" data-processing-percent>0%</div>
      </div>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="{{ asset_url('session_shared.js') }}"></script>
    <script src="{{ asset_url('app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
