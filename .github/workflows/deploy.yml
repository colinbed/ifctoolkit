name: Deploy to Civo

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build image
        run: |
          docker build -t ghcr.io/colinbed/ifctoolkit:latest .

      - name: Push image
        run: |
          docker push ghcr.io/colinbed/ifctoolkit:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          mkdir ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/ifctoolkit
          kubectl rollout status deployment/ifctoolkit
