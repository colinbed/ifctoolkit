name: Deploy to Civo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REPO: ghcr.io/colinbed/ifctoolkit
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: pytest tests/test_public_pages.py tests/test_runtime_startup.py tests/test_session_upload_route_alignment.py -q

      - name: Block tracked local secret files
        run: python scripts/check_tracked_secrets.py

      - name: Verify Kubernetes secret is configured
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG GitHub secret is not configured. Rotate Civo credentials and configure the replacement secret before deploying." >&2
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build image
        run: |
          docker build \
            -t "$IMAGE_REPO:$IMAGE_TAG" \
            -t "$IMAGE_REPO:latest" \
            .

      - name: Push image
        run: |
          docker push "$IMAGE_REPO:$IMAGE_TAG"
          docker push "$IMAGE_REPO:latest"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          umask 077
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy immutable image
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/ifctoolkit ifctoolkit="$IMAGE_REPO:$IMAGE_TAG"
          kubectl set env deployment/ifctoolkit DEPLOYED_GIT_SHA="$IMAGE_TAG"
          kubectl rollout status deployment/ifctoolkit --timeout=10m

      - name: Post-deployment smoke checks
        run: |
          kubectl get deployment/ifctoolkit
          curl --fail --silent --show-error https://ifctoolkit.com/health/live
          curl --fail --silent --show-error https://ifctoolkit.com/health/ready
          curl --fail --silent --show-error https://ifctoolkit.com/ >/dev/null
